function Spark({data,color,height=36}){
  if(!data||data.length<2)return null;
  const max=Math.max(...data,1),min=Math.min(...data),rng=max-min||1,W2=100,H=height;
  const pts=data.map((v,i)=>[i*(W2/(data.length-1)),H-Math.round((v-min)/rng*(H*.8))-(H*.1)]);
  const d="M"+pts.map(p=>p.join(",")).join(" L");
  return <svg viewBox={`0 0 ${W2} ${H}`} width="100%" height={height} preserveAspectRatio="none">
    <path d={d+` L${W2},${H} L0,${H} Z`} fill={color} opacity=".1"/>
    <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    {pts.slice(-1).map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="3" fill={color}/>)}
  </svg>;
}
function BarC({data,colors,labels,height=100}){
  if(!data||!data.length)return null;
  const max=Math.max(...data,1),n=data.length,bw=Math.floor(86/n),gap=Math.floor(14/n);
  return <svg viewBox={`0 0 100 ${height+16}`} width="100%" preserveAspectRatio="none" height={height+16}>
    {data.map((v,i)=>{
      const bh=Math.round((v/max)*(height-12)),x=i*(bw+gap)+gap*.5,y=height-bh;
      const c=Array.isArray(colors)?colors[i%colors.length]:colors;
      return <g key={i}>
        <rect x={x} y={y} width={bw} height={bh} rx="2" fill={c} opacity=".9"/>
        {v>0&&<text x={x+bw/2} y={y-2} textAnchor="middle" fontSize="4.5" fill={S5} fontFamily={FF}>{fmtM(v)}</text>}
        {labels&&<text x={x+bw/2} y={height+13} textAnchor="middle" fontSize="5.5" fill={S4} fontFamily={FF}>{labels[i]}</text>}
      </g>;
    })}
  </svg>;
}
