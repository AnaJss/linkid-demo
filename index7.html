<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Linkid · Plataforma de Gestión Deportiva</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F0F4F8;color:#0F172A;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
.screen{display:none}
.screen.active{display:block}
/* Login */
#login-screen{min-height:100vh;background:linear-gradient(135deg,#0A2240,#1A4578);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:18px;padding:28px 26px;width:100%;max-width:420px;box-shadow:0 28px 72px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo img{height:60px;object-fit:contain}
.login-title{font-size:20px;font-weight:800;color:#0F172A;margin-bottom:4px}
.login-sub{font-size:13px;color:#64748B;margin-bottom:22px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px}
.field input{padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:9px;font-size:13px;color:#0F172A;outline:none}
.field input:focus{border-color:#2563EB}
.btn-primary{width:100%;padding:13px;background:#0A2240;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;margin-top:6px}
.btn-primary:hover{background:#1A4578}
.error-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:9px 12px;font-size:13px;color:#DC2626;text-align:center;margin-bottom:12px;display:none}
.divider{border-top:1px solid #E2E8F0;margin:18px 0;position:relative;text-align:center}
.divider span{position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:#fff;padding:0 10px;font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.8px}
.demo-accounts{display:flex;flex-direction:column;gap:7px}
.demo-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:10px;text-align:left;width:100%}
.demo-btn:hover{background:#EFF6FF;border-color:#DBEAFE}
.demo-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.demo-info{flex:1}
.demo-name{font-size:13px;font-weight:700;color:#0F172A}
.demo-tag{font-size:11px;color:#64748B;margin-top:1px}
.demo-cred{font-size:10px;color:#94A3B8;font-family:monospace;margin-top:1px}
.demo-arrow{color:#2563EB;font-weight:700}
/* Dashboard shell */
#dash-screen{display:none;height:100vh;overflow:hidden;flex-direction:row}
#dash-screen.active{display:flex}
.sidebar{width:220px;flex-shrink:0;background:#0A2240;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.sidebar-logo{padding:13px 12px 10px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.sidebar-logo img{height:30px;object-fit:contain}
.sidebar-logo .org{font-size:9px;color:rgba(255,255,255,.35);font-weight:700;letter-spacing:1px;margin-top:3px}
.sidebar-nav{flex:1;padding:8px 7px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;width:100%;border:none;background:none;color:rgba(255,255,255,.6);font-size:13px;font-weight:500;text-align:left;margin-bottom:2px;position:relative}
.nav-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nav-btn.active{background:rgba(200,153,26,.18);color:#E5B22A;font-weight:700}
.nav-btn.active::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:2.5px;background:#E5B22A;border-radius:0 2px 2px 0}
.nav-ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.badge{background:#EF4444;color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;margin-left:auto}
.sidebar-footer{padding:9px 7px;border-top:1px solid rgba(255,255,255,.09)}
.user-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.07);margin-bottom:7px}
.user-av{width:26px;height:26px;border-radius:50%;background:#C8991A;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.user-name{font-size:12px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:10px;color:rgba(255,255,255,.4)}
.logout-btn{width:100%;padding:8px;background:none;border:1px solid rgba(255,255,255,.18);border-radius:8px;font-size:12px;font-weight:600;color:rgba(255,255,255,.6)}
.logout-btn:hover{background:rgba(255,255,255,.07)}
/* Main content */
.main-area{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.topbar{height:52px;background:#fff;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
.mob-menu{background:none;border:none;font-size:20px;color:#64748B;padding:4px;border-radius:7px;flex-shrink:0}
.topbar-title{font-size:13px;color:#64748B}
.topbar-title strong{color:#1E293B}
.content{flex:1;overflow-y:auto}
.page{padding:20px 22px 60px;max-width:1100px;margin:0 auto}
/* Cards / KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.kpi{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:15px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.kpi-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:9px}
.kpi-val{font-size:24px;font-weight:900;color:#0F172A;line-height:1;letter-spacing:-.3px}
.kpi-val.sm{font-size:17px}
.kpi-lbl{font-size:12px;color:#64748B;margin-top:3px;font-weight:500}
.kpi-bar{height:3px;border-radius:2px;background:#F1F5F9;overflow:hidden;margin-top:9px}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .6s}
/* Table */
.card{background:#fff;border:1px solid #E2E8F0;border-radius:11px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid #F1F5F9;font-size:13px;font-weight:700;color:#1E293B;display:flex;align-items:center;justify-content:space-between}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:8px 13px;font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #E2E8F0;text-align:left;white-space:nowrap;background:#F8FAFC}
td{padding:10px 13px;font-size:13px;color:#334155;border-bottom:1px solid #F1F5F9;vertical-align:middle}
tr:hover td{background:#F8FAFC}
/* Status pills */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.pill-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.pill-activo{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0}
.pill-adeudo{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.pill-baja{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.pill-graduacion{background:#FDF6E3;color:#92400E;border:1px solid #F0D080}
.pill-incapacidad{background:#FFF7ED;color:#9A3412;border:1px solid #FED7AA}
/* Search bar */
.search-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-input{flex:1;min-width:180px;padding:9px 12px 9px 32px;border:1.5px solid #E2E8F0;border-radius:9px;font-size:13px;color:#0F172A;outline:none;position:relative}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.search-wrap input{width:100%;padding:9px 12px 9px 32px;border:1.5px solid #E2E8F0;border-radius:9px;font-size:13px;color:#0F172A;outline:none}
select.filter{padding:9px 11px;border:1.5px solid #E2E8F0;border-radius:9px;font-size:12px;color:#334155;background:#fff;outline:none}
/* Section heading */
.ph{margin-bottom:20px}
.ph h2{font-size:21px;font-weight:800;color:#0F172A;letter-spacing:-.3px}
.ph p{font-size:13px;color:#64748B;margin-top:3px}
/* Group cards */
.group-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.group-card{background:#fff;border:1px solid #E2E8F0;border-radius:11px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);cursor:pointer;transition:all .18s}
.group-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.group-header{padding:12px 14px;position:relative;overflow:hidden}
.group-header::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.07) 1px,transparent 1px);background-size:11px 11px}
.group-title{font-size:13px;font-weight:800;color:#fff;position:relative;z-index:1}
.group-sub{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;position:relative;z-index:1}
.group-count{font-size:20px;font-weight:800;color:#fff;position:relative;z-index:1}
.group-body{padding:11px 13px;font-size:12px;color:#64748B}
.group-body div{display:flex;justify-content:space-between;margin-bottom:3px}
.group-body strong{color:#0F172A;font-weight:600}
/* PIN screen */
.pin-display{font-family:monospace;font-size:22px;font-weight:800;color:#1A4578;letter-spacing:5px}
/* Alert */
.alert{padding:11px 14px;border-radius:10px;display:flex;gap:9px;align-items:flex-start;margin-bottom:14px;font-size:13px}
.alert-warn{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
.alert-info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
/* Mobile overlay */
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
.mob-overlay.show{display:block}
@media(max-width:768px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .group-grid{grid-template-columns:repeat(2,1fr)}
  .sidebar{position:fixed;top:0;left:-220px;z-index:50;transition:left .2s}
  .sidebar.open{left:0}
  #dash-screen.active{flex-direction:column}
}
/* Parent mobile */
#parent-screen{display:none;min-height:100vh;background:#F0F4F8;max-width:480px;margin:0 auto;position:relative}
#parent-screen.active{display:block}
.parent-header{background:#0A2240;padding:13px 16px;display:flex;align-items:center;justify-content:space-between}
.parent-header-left{display:flex;align-items:center;gap:10px}
.parent-header img{height:28px;object-fit:contain}
.parent-greeting{font-size:14px;font-weight:700;color:#fff}
.parent-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px}
.parent-content{padding:16px 14px 80px}
.student-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.student-card-header{padding:14px 16px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.student-card-header::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.06) 1px,transparent 1px);background-size:12px 12px}
.stu-name{font-size:16px;font-weight:800;color:#fff;line-height:1.1;position:relative;z-index:1}
.stu-group{font-size:12px;color:rgba(255,255,255,.75);margin-top:3px;position:relative;z-index:1}
.student-card-body{padding:14px 16px}
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:12px}
.info-box{background:#F8FAFC;border-radius:9px;padding:8px 10px}
.info-lbl{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.info-val{font-size:11px;font-weight:600;color:#1E293B;word-break:break-all}
.pin-box{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border:1px solid #BFDBFE;border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.pin-lbl{font-size:10px;font-weight:700;color:#1E40AF;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.pin-val{font-family:monospace;font-size:28px;font-weight:800;color:#0A2240;letter-spacing:6px}
.pin-hidden{font-family:monospace;font-size:24px;color:#CBD5E1;letter-spacing:6px}
.pin-btn{padding:9px 15px;background:#0A2240;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;box-shadow:0 2px 8px rgba(10,34,64,.25)}
.pin-blocked{display:flex;align-items:center;gap:10px}
.pin-blocked-ico{font-size:24px}
.pin-blocked-txt{font-size:13px;font-weight:600;color:#92400E}
.pin-blocked-sub{font-size:11px;color:#64748B;margin-top:2px}
.parent-bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #E2E8F0;display:flex;padding:8px 0 4px;z-index:30;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.pnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:5px 0;color:#94A3B8;font-size:10px;font-weight:500;position:relative}
.pnav-btn.active{color:#0A2240;font-weight:700}
.pnav-ico{font-size:19px;line-height:1}
.pnav-active-bar{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:22px;height:3px;background:#0A2240;border-radius:2px 2px 0 0}
.pnav-badge{position:absolute;top:3px;right:calc(50% - 16px);width:14px;height:14px;background:#EF4444;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff}
/* Coach */
.att-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;background:#fff;border:1.5px solid #E2E8F0;border-radius:12px;width:100%;margin-bottom:7px;text-align:left}
.att-btn.present{background:#ECFDF5;border-color:#A7F3D0}
.att-check{width:28px;height:28px;border-radius:50%;background:#E2E8F0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.att-btn.present .att-check{background:#10B981;color:#fff}
.att-name{font-size:13px;font-weight:600;color:#0F172A;flex:1}
.att-status{font-size:12px;font-weight:700;color:#94A3B8}
.att-btn.present .att-status{color:#065F46}
/* Reports mini charts */
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.bar-lbl{width:100px;font-size:12px;color:#334155;font-weight:500;flex-shrink:0}
.bar-track{flex:1;height:7px;border-radius:4px;background:#F1F5F9;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .55s}
.bar-num{width:26px;text-align:right;font-size:13px;font-weight:700;color:#0F172A;flex-shrink:0}
</style>
</head>

// ── Utilities ──────────────────────────────────────────────────
function ini(n) { return (n||"").split(" ").slice(0,2).map(function(w){return w[0]||""}).join("").toUpperCase(); }
function fmtM(n) { return "$"+n.toLocaleString("es-MX"); }
function pct(a,b) { return b===0?0:Math.round(a/b*100); }
function escH(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function pill(status) {
  var map = {activo:["activo","Activo","#10B981"],adeudo:["adeudo","Adeudo","#F59E0B"],baja:["baja","Baja","#EF4444"],graduacion:["graduacion","Graduación Jun","#C8991A"],incapacidad:["incapacidad","Incapacidad","#F97316"]};
  var p = map[status]||map.activo;
  return '<span class="pill pill-'+p[0]+'"><span class="pill-dot" style="background:'+p[2]+'"></span>'+p[1]+'</span>';
}

// ── Show/hide screens ───────────────────────────────────────────
function showScreen(id) {
  var screens = ["login-screen","dash-screen","parent-screen","coach-screen"];
  screens.forEach(function(s) {
    var el = document.getElementById(s);
    if (el) { el.classList.remove("active"); }
  });
  var target = document.getElementById(id);
  if (target) target.classList.add("active");
}

// ── Login ────────────────────────────────────────────────────────
function doLogin() {
  var email = (document.getElementById("login-email").value||"").toLowerCase().trim();
  var pwd   = (document.getElementById("login-pwd").value||"").trim();
  var user  = ACCOUNTS.find(function(a){ return a.email===email && a.pwd===pwd; });
  if (!user) {
    var err = document.getElementById("login-error");
    err.style.display = "block";
    return;
  }
  loginAs(user);
}
function loginAs(user) {
  currentUser = user;
  document.getElementById("login-error").style.display = "none";
  try {
    if (user.role === "admin")  { initAdmin(); }
    else if (user.role === "coach")  { initCoach(); }
    else { initParent(); }
  } catch(e) {
    document.getElementById("login-error").textContent = "Error: " + e.message;
    document.getElementById("login-error").style.display = "block";
    console.error("Login error:", e);
  }
}
function doLogout() {
  currentUser = null;
  showScreen("login-screen");
}

function initAdmin() {
  // Set user info in sidebar
  document.getElementById("user-av").textContent = ini(currentUser.name);
  document.getElementById("user-name").textContent = currentUser.name;
  document.getElementById("user-role").textContent = "Administrador";
  
  // Build sidebar nav
  var nav = document.getElementById("sidebar-nav");
  var adeudoCount = SD.filter(function(s){return s.status==="adeudo";}).length;
  nav.innerHTML = "";
  ADMIN_NAVS.forEach(function(n) {
    var btn = document.createElement("button");
    btn.className = "nav-btn" + (currentNav===n.id?" active":"");
    btn.dataset.nav = n.id;
    var badge = n.id==="alumnos" && adeudoCount>0 ? '<span class="badge">'+adeudoCount+'</span>' : "";
    btn.innerHTML = '<span class="nav-ico">'+n.ico+'</span><span>'+n.label+'</span>'+badge;
    btn.onclick = function() { setAdminNav(n.id); };
    nav.appendChild(btn);
  });
  
  showScreen("dash-screen");
  setAdminNav("dashboard");
}

function setAdminNav(navId) {
  currentNav = navId;
  // Update active state
  document.querySelectorAll("#sidebar-nav .nav-btn").forEach(function(b) {
    b.classList.toggle("active", b.dataset.nav===navId);
  });
  var label = (ADMIN_NAVS.find(function(n){return n.id===navId;})||{}).label||navId;
  document.getElementById("topbar-breadcrumb").innerHTML = '<strong>'+label+'</strong>';
  // Render content
  var page = document.getElementById("page-content");
  if (navId==="dashboard") {
    try { page.innerHTML = renderAdminDashboard(); }
    catch(e) { page.innerHTML = '<div style="padding:20px;color:red"><b>Error en dashboard:</b> '+e.message+'</div>'; console.error(e); }
  }
  else if (navId==="alumnos") renderAdminAlumnos(page);
  else if (navId==="grupos") page.innerHTML = renderAdminGrupos();
  else if (navId==="pins") page.innerHTML = renderAdminPins();
  else if (navId==="pagos") page.innerHTML = renderAdminPagos();
  else if (navId==="reportes") page.innerHTML = renderAdminReportes();
  else if (navId==="padres") page.innerHTML = renderAdminPadres();
  // Close mob menu
  closeMobMenu();
}

function openMobMenu() { document.getElementById("sidebar").classList.add("open"); document.getElementById("mob-overlay").classList.add("show"); }
function closeMobMenu() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("mob-overlay").classList.remove("show"); }

var alumnosFilter = {search:"", gpo:"all", status:"all"};

function renderAdminAlumnos(page) {
  var html = '<div class="ph"><h2>Alumnos</h2></div>';
  html += '<div class="search-bar">'
    +'<div class="search-wrap"><input type="text" id="alu-search" placeholder="Buscar nombre, matrícula…" oninput="filterAlumnos()" value="'+escH(alumnosFilter.search)+'"/></div>'
    +'<select class="filter" id="alu-gpo" onchange="filterAlumnos()">'
    +'<option value="all">Todos los grupos</option>';
  Object.keys(GROUPS).forEach(function(gid) {
    html += '<option value="'+gid+'"'+(alumnosFilter.gpo===gid?" selected":"")+'>'+GROUPS[gid].ico+' '+escH(GROUPS[gid].short)+'</option>';
  });
  html += '</select>'
    +'<select class="filter" id="alu-status" onchange="filterAlumnos()">'
    +'<option value="all">Todos los estatus</option>'
    +'<option value="activo"'+(alumnosFilter.status==="activo"?" selected":"")+'>Activo</option>'
    +'<option value="adeudo"'+(alumnosFilter.status==="adeudo"?" selected":"")+'>Adeudo</option>'
    +'<option value="baja"'+(alumnosFilter.status==="baja"?" selected":"")+'>Baja</option>'
    +'<option value="graduacion"'+(alumnosFilter.status==="graduacion"?" selected":"")+'>Graduación</option>'
    +'</select></div>';
  html += '<div id="alumnos-table"></div>';
  page.innerHTML = html;
  renderAlumnosTable();
}

function filterAlumnos() {
  alumnosFilter.search = (document.getElementById("alu-search")||{}).value||"";
  alumnosFilter.gpo    = (document.getElementById("alu-gpo")||{}).value||"all";
  alumnosFilter.status = (document.getElementById("alu-status")||{}).value||"all";
  renderAlumnosTable();
}

function renderAlumnosTable() {
  var q = alumnosFilter.search.toLowerCase();
  var filtered = SD.filter(function(s) {
    return (alumnosFilter.gpo==="all"||s.gid===alumnosFilter.gpo)
        && (alumnosFilter.status==="all"||s.status===alumnosFilter.status)
        && (!q||s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q)||(s.padre||"").toLowerCase().includes(q));
  });
  
  var html = '<div class="card"><div class="card-header">'+filtered.length+' alumnos</div>'
    +'<div class="table-wrap"><table><thead><tr>'
    +'<th>Alumno</th><th>Matrícula</th><th>Grupo</th><th>Edad</th><th>Estatus</th><th>Padre/Tutor</th><th>Mayo</th>'
    +'</tr></thead><tbody>';
  
  filtered.forEach(function(s) {
    var g = GROUPS[s.gid]||{};
    var mayo = s.mayo===1?"Pensión":s.mayo>1?fmtM(s.mayo):"$0";
    var mayoColor = s.mayo===1?"#065F46":s.mayo>1?"#1A4578":"#EF4444";
    html += '<tr>'
      +'<td><strong>'+escH(s.name)+'</strong></td>'
      +'<td style="font-family:monospace;font-size:11px;color:#94A3B8">'+escH(s.id)+'</td>'
      +'<td>'+(g.ico?'<span style="background:'+g.color+'18;color:'+g.color+';border:1px solid '+g.color+'28;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600">'+g.ico+' '+escH(g.short)+'</span>':"—")+'</td>'
      +'<td style="text-align:center;font-weight:600">'+(s.edad||"—")+'</td>'
      +'<td>'+pill(s.status)+'</td>'
      +'<td style="font-size:12px">'+escH(s.padre||"")+'</td>'
      +'<td style="font-family:monospace;font-weight:700;color:'+mayoColor+'">'+mayo+'</td>'
      +'</tr>';
  });
  
  html += '</tbody></table></div>'
    +'<div style="padding:9px 14px;background:#F8FAFC;font-size:12px;color:#64748B;border-top:1px solid #F1F5F9">'
    +filtered.length+' registros</div></div>';
  
  var container = document.getElementById("alumnos-table");
  if (container) container.innerHTML = html;
}

  html += '<div class="kpi-grid" style="margin-bottom:18px">';

   {"ico":"🟢","v":activos,"l":"Activos","bg":"#ECFDF5","c":"#065F46","b":"#10B981","p":pct(activos,total)},

    html += '<div class="kpi"><div class="kpi-ico" style="background:'+k.bg+'">'+k.ico+'</div>'
      +'<div class="kpi-val'+(k.sm?" sm":"")+'">'+escH(String(k.v))+'</div>'
      +'<div class="kpi-lbl">'+k.l+'</div>'
      +'<div class="kpi-bar"><div class="kpi-bar-fill" style="width:'+k.p+'%;background:'+k.b+'"></div></div>'

  // By discipline
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">';

      +'<div class="bar-num">'+cnt+'</div></div>';

  html += '</div></div>';

  // Monthly totals
  html += '<div class="card"><div class="card-header">Ingresos mensuales</div><div style="padding:14px">';
  var maxM = Math.max.apply(null,Object.values(MT));
  Object.keys(MT).forEach(function(m) {
    html += '<div class="bar-row"><div class="bar-lbl">'+m+'</div>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+pct(MT[m],maxM)+'%;background:'+(m==="MAY"?"#2563EB":"#93C5FD")+'"></div></div>'
      +'<div class="bar-num" style="font-size:11px;width:50px">'+fmtM(MT[m])+'</div></div>';
  });
  html += '</div></div></div>';
  
  // Attendance
  var attend = {"bas-varonil-a":82,"bas-femenil-a":90,"bas-b":76,"tochito-a":88,"tochito-b":79,"vol-a":85,"vol-b":92};
  html += '<div class="card"><div class="card-header">Asistencia promedio por grupo</div><div style="padding:14px">';
  Object.keys(attend).forEach(function(gid) {
    var g = GROUPS[gid]||{};

var COACH_NAVS = [

];

function initCoach() {
  activeGid = (currentUser.gids||[])[0] || "vol-a";
  document.getElementById("coach-av").textContent   = ini(currentUser.name);
  document.getElementById("coach-name").textContent = currentUser.name;

  // Group chips
  var chips = document.getElementById("coach-group-chips");
  chips.innerHTML = "";
  (currentUser.gids||[]).forEach(function(gid) {
    var g   = GROUPS[gid] || {};
    var cnt = SD.filter(function(s){return s.gid===gid;}).length;
    var btn = document.createElement("button");
    btn.style.cssText = "padding:4px 10px;border-radius:20px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0";
    btn.dataset.gid   = gid;
    btn.textContent   = g.ico + " " + g.short + " (" + cnt + ")";
    btn.onclick = function() { activeGid = gid; updateCoachChips(); setCoachNav(coachNav); };
    chips.appendChild(btn);
  });
  updateCoachChips();

  // Sidebar nav
  var nav = document.getElementById("coach-sidebar-nav");
  nav.innerHTML = "";
  COACH_NAVS.forEach(function(n) {
    var btn = document.createElement("button");
    btn.className   = "nav-btn";
    btn.dataset.nav = n.id;
    btn.innerHTML   = '<span class="nav-ico">' + n.ico + '</span><span>' + n.label + '</span>';
    btn.onclick = function() { setCoachNav(n.id); };
    nav.appendChild(btn);
  });

  showScreen("coach-screen");
  setCoachNav("home");
}

function updateCoachChips() {
  document.querySelectorAll("#coach-group-chips button").forEach(function(b) {
    var g = GROUPS[b.dataset.gid] || {};
    if (b.dataset.gid === activeGid) {
      b.style.background = g.color || "#1A4578"; b.style.color = "#fff";
    } else {
      b.style.background = "rgba(0,0,0,.06)"; b.style.color = "#475569";
    }
  });
}

function openCoachMenu()  { document.getElementById("coach-sidebar").classList.add("open"); document.getElementById("coach-mob-overlay").classList.add("show"); }
function closeCoachMenu() { document.getElementById("coach-sidebar").classList.remove("open"); document.getElementById("coach-mob-overlay").classList.remove("show"); }

function setCoachNav(navId) {
  coachNav = navId;
  document.querySelectorAll("#coach-sidebar-nav .nav-btn").forEach(function(b) {
    b.classList.toggle("active", b.dataset.nav === navId);
  });
  var g    = GROUPS[activeGid] || {};
  document.getElementById("coach-topbar").innerHTML = "<strong>" + escH(g.n||"Mi grupo") + "</strong>";
  var page = document.getElementById("coach-page-content");
  if (navId === "home")  page.innerHTML = renderCoachHome();
  else if (navId === "lista") page.innerHTML = renderCoachLista();
  else if (navId === "asist") renderCoachAsist(page);
  else if (navId === "msgs")  page.innerHTML = renderCoachMsgs();
  closeCoachMenu();
}

function renderCoachAsist(page) {
  var g        = GROUPS[activeGid] || {};
  var mem      = SD.filter(function(s){return s.gid===activeGid;});
  var todayKey = activeGid + "-today";
  var todayAtt = attendance[todayKey] || {};
  var presentCnt = Object.values(todayAtt).filter(Boolean).length;

  var html =
    '<div class="ph"><h2>Asistencia</h2>' +
    '<p>' + new Date().toLocaleDateString("es-MX", {weekday:"long",day:"numeric",month:"long"}) + "</p></div>" +
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">' +
    '<div style="background:#EFF6FF;border-radius:11px;padding:12px;text-align:center;border:1px solid #E2E8F0"><div style="font-size:24px;font-weight:800;color:#1A4578">' + mem.length + '</div><div style="font-size:11px;color:#64748B;margin-top:3px">Total</div></div>' +
    '<div style="background:#ECFDF5;border-radius:11px;padding:12px;text-align:center;border:1px solid #E2E8F0"><div style="font-size:24px;font-weight:800;color:#065F46">' + presentCnt + '</div><div style="font-size:11px;color:#64748B;margin-top:3px">Presentes</div></div>' +
    '<div style="background:#FEF2F2;border-radius:11px;padding:12px;text-align:center;border:1px solid #E2E8F0"><div style="font-size:24px;font-weight:800;color:#991B1B">' + (mem.length - presentCnt) + '</div><div style="font-size:11px;color:#64748B;margin-top:3px">Ausentes</div></div>' +
    '</div><div id="att-list"></div>' +
    '<button onclick="saveAttendance()" style="width:100%;padding:13px;background:#0A2240;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;margin-top:8px;cursor:pointer;font-family:inherit">Guardar asistencia (' + presentCnt + "/" + mem.length + ")</button>";

  page.innerHTML = html;

  var list = document.getElementById("att-list");
  mem.forEach(function(s) {
    var here = !!todayAtt[s.id];
    var btn  = document.createElement("button");
    btn.className = "att-btn" + (here ? " present" : "");
    btn.innerHTML =
      '<div class="att-check">' + (here ? "✓" : "") + "</div>" +
      '<div style="width:36px;height:36px;border-radius:50%;background:' + (g.color||"#1A4578") + ';color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">' + ini(s.name) + "</div>" +
      '<div class="att-name">' + escH(s.name) + "</div>" +
      '<div class="att-status">' + (here ? "✓ Presente" : "Ausente") + "</div>";
    btn.onclick = function() {
      if (!attendance[todayKey]) attendance[todayKey] = {};
      attendance[todayKey][s.id] = !todayAtt[s.id];
      renderCoachAsist(page);
    };
    list.appendChild(btn);
  });

function sendCoachMsg() {
  var txt = (document.getElementById("msg-txt")||{}).value || "";
  if (!txt.trim()) return;
  var g   = GROUPS[activeGid] || {};
  var now = new Date().toISOString().slice(0,10);
  coachMessages.unshift({
    id:   "m" + Date.now(),
    gid:  activeGid,
    from: currentUser.name,
    date: now,
    type: window._selectedMsgType || "info",
    text: txt.trim()
  });
  var el = document.getElementById("msg-sent");
  if (el) { el.style.display="block"; setTimeout(function(){el.style.display="none";},2500); }
  document.getElementById("msg-txt").value = "";
  // Re-render to show new message
  setTimeout(function(){ setCoachNav("msgs"); }, 600);
}

function saveAttendance() {
  var g          = GROUPS[activeGid] || {};
  var mem        = SD.filter(function(s){return s.gid===activeGid;});
  var todayKey   = activeGid + "-today";
  var presentCnt = Object.values(attendance[todayKey]||{}).filter(Boolean).length;
  alert("✅ Asistencia guardada: " + presentCnt + "/" + mem.length + " presentes en " + (g.n||""));
}

function initParent() {
  // Load any previously linked students for this user

  }
  showScreen("parent-screen");
  document.getElementById("parent-greeting").textContent =
    "Hola, " + currentUser.name.split(" ")[0] + " 👋";

function buildParentNav() {
  var sids     = linkedStudents[currentUser.id] || [];
  var myGids   = sids.map(function(sid){
    var s = SD.find(function(x){return x.id===sid;});
    return s ? s.gid : null;
  }).filter(Boolean);
  var msgCount = coachMessages.filter(function(m){
    return myGids.includes(m.gid);
  }).length;

  var nav = document.getElementById("parent-nav");
  if (!nav) return;
  nav.innerHTML = "";
  PARENT_TABS.forEach(function(t) {
    var badge = t.id==="mensajes" ? msgCount : 0;
    var btn   = document.createElement("button");
    btn.className = "pnav-btn" + (parentTab===t.id ? " active" : "");
    btn.dataset.tab = t.id;
    btn.innerHTML =
      '<div class="pnav-ico">' + t.ico + '</div>' +
      '<div>' + t.l + '</div>' +
      (badge > 0 ? '<div class="pnav-badge">' + badge + '</div>' : '') +
      (parentTab===t.id ? '<div class="pnav-active-bar"></div>' : '');
    btn.onclick = function() { renderParentTab(t.id); };
    nav.appendChild(btn);
  });
}

function renderParentTab(tab) {
  parentTab = tab;
  buildParentNav();
  var content = document.getElementById("parent-content");
  if (!content) return;

  if (tab === "home")     renderParentHome(content);
  else if (tab === "pin") renderParentPin(content);
  else if (tab === "mensajes") renderParentMensajes(content);
  else if (tab === "perfil") renderParentPerfil(content);
  else if (tab === "vincular") renderParentVincular(content);
}

function renderVincResult() {
  var el = document.getElementById("vinc-result");
  if (!el) return;
  if (vincState === "idle") { el.innerHTML = ""; return; }
  if (vincState === "loading") {
    el.innerHTML = '<div style="padding:13px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;text-align:center;font-size:14px;color:#1E40AF;font-weight:600;margin-bottom:12px">Verificando…</div>';
    return;
  }
  if (vincState === "error") {
    el.innerHTML = '<div style="padding:13px;background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;margin-bottom:12px">' +
      '<div style="font-weight:700;color:#991B1B;font-size:14px;margin-bottom:3px">Código o matrícula inválidos</div>' +
      '<div style="font-size:12px;color:#B91C1C">Verifica los datos e inténtalo de nuevo.</div></div>';
    return;
  }
  if (vincState === "already") {
    el.innerHTML = '<div style="padding:13px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;margin-bottom:12px;font-size:13px;color:#92400E;font-weight:600">⚠️ Este alumno ya está vinculado a tu cuenta</div>';
    return;
  }
  if (vincState === "success" && window._vincFound) {
    var s = window._vincFound;
    var g = GROUPS[s.gid] || {};
    el.innerHTML =
      '<div style="background:#ECFDF5;border:1px solid #A7F3D0;border-radius:12px;padding:14px 16px;margin-bottom:12px">' +
      '<div style="font-weight:700;color:#065F46;font-size:13px;margin-bottom:10px">✅ Alumno encontrado — Confirma la vinculación</div>' +
      '<div style="display:flex;align-items:center;gap:12px">' +
      '<div style="width:42px;height:42px;border-radius:50%;background:' + (g.color||"#1A4578") + ';color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">' + ini(s.name) + '</div>' +
      '<div><div style="font-weight:700;font-size:15px;color:#0F172A">' + escH(s.name) + '</div>' +
      '<div style="font-size:12px;color:#64748B;margin-top:2px">' + escH(g.n||"—") + ' · ' + escH(g.dias||"") + '</div>' +
      '<div style="font-size:12px;color:#64748B;margin-top:1px">' + s.edad + ' años · Coach: ' + escH(g.coach||"—") + '</div></div></div></div>' +
      '<button onclick="confirmVincular()" style="width:100%;padding:12px;background:#10B981;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px">Confirmar vinculación →</button>';
  }
}

function doVincular() {
  var mat  = ((document.getElementById("vinc-mat")||{}).value||"").trim().toUpperCase();
  var code = ((document.getElementById("vinc-code")||{}).value||"").trim().toUpperCase();
  if (!mat || !code) return;

  vincState = "loading";
  renderVincResult();

  setTimeout(function() {
    var found = SD.find(function(s){
      return s.id.toUpperCase() === mat && s.vc.toUpperCase() === code;
    });
    var sids = linkedStudents[currentUser.id] || [];
    if (!found) { vincState = "error"; }
    else if (sids.includes(found.id)) { vincState = "already"; }
    else { vincState = "success"; window._vincFound = found; }
    renderVincResult();
    // Change button text
    var btn = document.getElementById("vinc-btn");
    if (btn && vincState !== "success") btn.textContent = "Verificar datos";
  }, 600);
}

function confirmVincular() {
  if (!window._vincFound) return;
  if (!linkedStudents[currentUser.id]) linkedStudents[currentUser.id] = [];
  linkedStudents[currentUser.id].push(window._vincFound.id);
  window._vincFound = null;
  vincState = "idle";
  renderParentTab("home");
}

// ── PERFIL TAB ────────────────────────────────────────────────
function renderParentPerfil(content) {
  var sids     = linkedStudents[currentUser.id] || [];
  var students = SD.filter(function(s){ return sids.includes(s.id); });

  content.innerHTML =
    '<div style="background:linear-gradient(135deg,#0A2240,#1A4578);border-radius:16px;padding:20px 18px;display:flex;align-items:center;gap:14px;margin-bottom:18px">' +
    '<div style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center">' + ini(currentUser.name) + '</div>' +
    '<div><div style="font-weight:800;font-size:17px;color:#fff">' + escH(currentUser.name) + '</div>' +
    '<div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:2px">' + escH(currentUser.email) + '</div>' +
    '<div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:2px">' + students.length + ' hijo(s) vinculado(s)</div></div></div>' +

    (students.length > 0
      ? '<div style="background:#fff;border:1px solid #E2E8F0;border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)">' +
        '<div style="padding:11px 16px;border-bottom:1px solid #F1F5F9;font-size:12px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px">Hijos vinculados</div>' +
        students.map(function(s){
          var g = GROUPS[s.gid]||{};
          return '<div style="padding:12px 16px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;gap:10px">' +
            '<div style="width:34px;height:34px;border-radius:50%;background:' + (g.color||"#1A4578") + ';color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center">' + ini(s.name) + '</div>' +
            '<div style="flex:1"><div style="font-size:13px;font-weight:600;color:#0F172A">' + escH(s.name) + '</div>' +
            '<div style="font-size:11px;color:#64748B;margin-top:1px">' + escH(g.n||"") + ' · ' + escH(s.id) + '</div></div>' +
            pill(s.status) + '</div>';
        }).join('') + '</div>'
      : '') +

    '<button onclick="goVincular()" style="width:100%;padding:12px 16px;background:#ECFDF5;border:1.5px solid #A7F3D0;border-radius:14px;display:flex;align-items:center;gap:12px;cursor:pointer;font-family:inherit;text-align:left;margin-bottom:10px">' +
    '<div style="font-size:20px">🔗</div>' +
    '<div><div style="font-size:14px;font-weight:700;color:#065F46">Vincular otro hijo/a</div>' +
    '<div style="font-size:12px;color:#64748B;margin-top:1px">Agregar a otro alumno del Club</div></div></button>' +

    '<button onclick="doLogout()" style="width:100%;padding:14px;background:#FEF2F2;border:1.5px solid #FECACA;border-radius:14px;font-size:14px;font-weight:700;color:#991B1B;cursor:pointer;font-family:inherit">↩ Cerrar sesión</button>';
}

function tgPin(btn) {
  var sid = btn.getAttribute("data-sid");
  showPins[sid] = !showPins[sid];
  renderParentTab("home");
}
function tgPinTab(btn) {
  var sid = btn.getAttribute("data-stab");
  showPins["pin_"+sid] = !showPins["pin_"+sid];
  renderParentTab("pin");
}
</script>
</body>
</html>
